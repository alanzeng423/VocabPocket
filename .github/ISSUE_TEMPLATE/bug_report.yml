name: Bug 报告
description: 报告可以稳定复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期待什么？
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: macOS 15.4
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可附截图、日志和发生问题的应用名称。
